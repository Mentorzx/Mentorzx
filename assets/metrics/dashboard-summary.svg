ght="700" text-anchor="start">FOLLOWING</text><text x="660" y="194" fill="#E5E7EB" font-size="34" font-weight="700" text-anchor="start">6</text><text x="660" y="214" fill="#CBD5E1" font-size="14" font-weight="400" text-anchor="start">network and collaboration</text><rect x="42" y="248" width="278" height="108" rx="18" fill="#0F172A" stroke="#23314D" stroke-width="1" /><rect x="60" y="266" width="10" height="10" rx="5" fill="#22C55E" /><text x="84" y="276" fill="#94A3B8" font-size="13" font-weight="700" text-anchor="start">PUBLIC STARS</text><text x="64" y="320" fill="#E5E7EB" font-size="34" font-weight="700" text-anchor="start">2</text><text x="64" y="340" fill="#CBD5E1" font-size="14" font-weight="400" text-anchor="start">signals on shipped repos</text><rect x="340" y="248" width="278" height="108" rx="18" fill="#0F172A" stroke="#23314D" stroke-width="1" /><rect x="358" y="266" width="10" height="10" rx="5" fill="#F59E0B" /><text x="382" y="276" fill="#94A3B8" font-size="13" font-weight="700" text-anchor="start">PUBLIC FORKS</text><text x="362" y="320" fill="#E5E7EB" font-size="34" font-weight="700" text-anchor="start">2</text><text x="362" y="340" fill="#CBD5E1" font-size="14" font-weight="400" text-anchor="start">reuse and derivation</text><rect x="638" y="248" width="278" height="108" rx="18" fill="#0F172A" stroke="#23314D" stroke-width="1" /><rect x="656" y="266" width="10" height="10" rx="5" fill="#38BDF8" /><text x="680" y="276" fill="#94A3B8" font-size="13" font-weight="700" text-anchor="start">HIREABLE</text><text x="660" y="320" fill="#E5E7EB" font-size="34" font-weight="700" text-anchor="start">Yes</text><text x="660" y="340" fill="#CBD5E1" font-size="14" font-weight="400" text-anchor="start">profile flag from GitHub</text><text x="42" y="382" fill="#94A3B8" font-size="13" font-weight="400" text-anchor="start">Computed from public repositories, excluding the profile repo from language analysis. Recent repo surface: Mentorzx, Hermes, AudCifra, production-f