<svg width="820" height="340" viewBox="0 0 820 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Overview metrics placeholder</title>
  <desc id="desc">Placeholder for the GitHub overview dashboard until the metrics workflow runs.</desc>
  <rect width="820" height="340" rx="24" fill="#0B1220"/>
  <rect x="1" y="1" width="818" height="338" rx="23" stroke="#2F3E53"/>
  <text x="40" y="64" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">GitHub overview</text>
  <text x="40" y="96" fill="#8B9CB5" font-family="Segoe UI, Arial, sans-serif" font-size="15">This file is generated by GitHub Actions.</text>
  <rect x="40" y="132" width="740" height="160" rx="18" fill="#111827" stroke="#334155"/>
  <text x="64" y="170" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Next step</text>
  <text x="64" y="200" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Add a repository secret named METRICS_TOKEN and run the workflow once.</text>
  <text x="64" y="228" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">The generated dashboard will replace this placeholder automatically.</text>
  <text x="64" y="266" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="14">Configured output: profile overview, recent activity and isometric calendar.</text>
</svg>
