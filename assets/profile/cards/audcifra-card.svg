<svg width="760" height="240" viewBox="0 0 760 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AudCifra project card</title>
  <desc id="desc">Audio pipeline that transcribes songs, detects chords and exports a document with lyrics and harmony.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="760" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="760" height="240" rx="24" fill="url(#panel)"/>
  <rect x="1" y="1" width="758" height="238" rx="23" stroke="#2F3E53"/>
  <text x="40" y="58" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">AudCifra</text>
  <text x="40" y="84" fill="#8B9CB5" font-family="Segoe UI, Arial, sans-serif" font-size="15">Applied AI  •  audio-to-document pipeline for chords and lyrics</text>
  <text x="40" y="118" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Problem</text>
  <text x="40" y="138" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Turn raw music audio into a more usable artifact by combining transcription, chord detection and structured export.</text>
  <text x="40" y="170" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Stack</text>
  <text x="40" y="190" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Python, asyncio, ThreadPoolExecutor, configurable audio preprocessing and DOCX generation</text>
  <text x="40" y="218" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="14">Why it matters: connects audio processing, concurrency and structured output generation in one workflow.</text>
</svg>
