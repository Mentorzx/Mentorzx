<svg width="760" height="240" viewBox="0 0 760 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MCP-register project card</title>
  <desc id="desc">Python MCP server for registration and semantic search backed by SQLite and FAISS.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="760" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="760" height="240" rx="24" fill="url(#panel)"/>
  <rect x="1" y="1" width="758" height="238" rx="23" stroke="#2F3E53"/>
  <text x="40" y="58" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">MCP-register</text>
  <text x="40" y="84" fill="#8B9CB5" font-family="Segoe UI, Arial, sans-serif" font-size="15">Backend  •  registration and semantic lookup over MCP</text>
  <text x="40" y="118" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Problem</text>
  <text x="40" y="138" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <tspan x="40" dy="0">Need a small user registry with CRUD-style flows</tspan>
    <tspan x="40" dy="16">and meaning-based search without external APIs.</tspan>
  </text>
  <text x="40" y="170" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Stack</text>
  <text x="40" y="190" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <tspan x="40" dy="0">Python 3.12, FastMCP, SQLite, FAISS CPU,</tspan>
    <tspan x="40" dy="16">sentence-transformers and Docker.</tspan>
  </text>
  <text x="40" y="220" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="13">Why it matters: modular backend delivery with local vector search.</text>
</svg>
