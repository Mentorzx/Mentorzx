name: Profile Metrics

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate custom dashboard assets
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USER: Mentorzx
        run: python scripts/generate_dashboard_assets.py

      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mentorzx
          filename: assets/metrics/isocalendar.svg
          base: ""
          config_timezone: America/Bahia
          config_display: large
          config_padding: 12
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          repositories_skipped: Mentorzx/Mentorzx

      - name: Commit refreshed dashboard assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh profile dashboard assets"
          file_pattern: assets/metrics/*.svg
