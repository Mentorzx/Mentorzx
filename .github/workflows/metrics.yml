name: Profile Metrics

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate overview dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mentorzx
          filename: assets/metrics/overview.svg
          base: header, activity, repositories, metadata
          base_indepth: yes
          base_hireable: yes
          config_timezone: America/Bahia
          config_display: large
          config_padding: 12
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          repositories_skipped: Mentorzx/Mentorzx

      - name: Generate language dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mentorzx
          filename: assets/metrics/languages.svg
          base: ""
          config_timezone: America/Bahia
          config_display: large
          config_padding: 12
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_categories: programming
          plugin_languages_limit: 6
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage
          repositories_skipped: Mentorzx/Mentorzx

      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mentorzx
          filename: assets/metrics/isocalendar.svg
          base: ""
          config_timezone: America/Bahia
          config_display: large
          config_padding: 12
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          repositories_skipped: Mentorzx/Mentorzx
