name: Profile README

on:
  pull_request:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Run regression tests
        run: python -m pytest -q

  refresh-assets:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile dashboard assets
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python scripts/generate_dashboard_assets.py

      - name: Commit refreshed dashboard assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: refresh profile dashboard assets"
          file_pattern: assets/metrics/dashboard-summary.svg assets/profile/hero-banner.svg assets/profile/architecture/engineering-matrix.svg assets/profile/cards/*.svg
